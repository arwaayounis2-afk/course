        <h1> Add Course</h1>
        <div class="form">

            <form>
                <div class="add">
                    <label>Course Name</label>
                    <br>
                    <input type="text" name="Course Name" required placeholder="Write A Course Name">
                </div>
                <br>
                <div class="add">
                    <label>Instructor</label>
                    <br>
                    <input type="text" name="Instructor" required placeholder="Write A Instructor Name">
                </div>
                <br>
                <div class="add">
                    <label>Credit Hours</label>
                    <br>
                    <input type="number" placeholder="Choose Credit Hours" name="hours" min="1" max="5">
                </div>
                <br>
                <div class="add">
                    <label>Notes</label>
                    <br>
                    <input name="notes" placeholder="Enter course details...">
                </div>
                <br>
                <input type="submit">

            </form>
